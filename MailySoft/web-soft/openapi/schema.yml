          readOnly: true
        first_name:
          type: string
          readOnly: true
        last_name:
          type: string
          readOnly: true
        platform_role:
          type: string
          readOnly: true
        platform_role_display:
          type: string
          description: Devuelve el label legible del platform_role.
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
      required:
      - email
      - first_name
      - full_name
      - id
      - is_active
      - last_name
      - platform_role
      - platform_role_display
    StaffCreateInputRequest:

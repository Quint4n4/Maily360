    TenantSubscriptionInputRequest:
      type: object
      description: |-
        Input para POST /api/v1/plataforma/clinicas/<tenant_id>/suscripcion/.

        Los 3 campos son obligatorios (decisión del encargo: sin defaults, la
        plataforma siempre elige explícitamente plan + ciclo + vigencia).
      properties:
        plan_id:
          type: string
          format: uuid
          description: UUID del plan a asignar.
        billing_cycle:
          allOf:
          - $ref: '#/components/schemas/BillingCycleEnum'
          description: |-
            Ciclo de facturación: 'monthly' o 'annual'.

            * `monthly` - monthly
            * `annual` - annual
        current_period_end:
          type: string
          format: date
          description: Fecha de fin del periodo de facturación. Debe ser futura.
      required:
      - billing_cycle
      - current_period_end
      - plan_id

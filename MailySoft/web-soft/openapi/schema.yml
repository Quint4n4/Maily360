components:
  schemas:
    AuditLogOutput:
      type: object
      description: Serializer de salida para un registro de AuditLog en el panel de
        plataforma.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        action:
          type: string
          readOnly: true
        action_display:
          type: string
          description: Devuelve el label legible de la acción.
          readOnly: true
        actor_email:
          type: string
          nullable: true
          description: Email del actor, o None si el evento es anónimo o el usuario
            se borró.
          readOnly: true
        actor_role:
          type: string
          readOnly: true
        tenant_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        tenant_name:
          type: string
          nullable: true
          description: Nombre de la clínica, o None si el evento es global (sin tenant).
          readOnly: true
        resource_type:
          type: string
          readOnly: true
        resource_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        description:
          type: string
          readOnly: true
        ip_address:
          type: string
          readOnly: true
          nullable: true
        metadata:
          readOnly: true
      required:
      - action
      - action_display
      - actor_email
      - actor_role
      - created_at
      - description
      - id
      - ip_address
      - metadata
      - resource_id
      - resource_type
      - tenant_id
      - tenant_name
    BillingCycleEnum:
      enum:
      - monthly
      - annual
      type: string
      description: |-
        * `monthly` - monthly
        * `annual` - annual
    ClinicaCreateInputRequest:
      type: object
      description: Input para POST /api/v1/plataforma/clinicas/.
      properties:
        name:
          type: string
          minLength: 1
          description: Nombre comercial de la clínica.
          maxLength: 200
        owner_email:
          type: string
          format: email
          minLength: 1
          description: Correo del dueño. Será su usuario de acceso a la plataforma.
        owner_first_name:
          type: string
          minLength: 1
          description: Nombre(s) del dueño.
          maxLength: 150
        owner_last_name:
          type: string
          minLength: 1
          description: Apellidos del dueño.
          maxLength: 150
        timezone:
          type: string
          minLength: 1
          default: America/Mexico_City
          description: 'Zona horaria IANA de la clínica (ej: ''America/Monterrey'').'
          maxLength: 64
        trial_days:
          type: integer
          maximum: 365
          minimum: 1
          default: 60
          description: Duración del periodo de prueba en días. Mínimo 1, máximo 365.
      required:
      - name
      - owner_email
      - owner_first_name
      - owner_last_name
    ClinicaCreateOutput:
      type: object
      description: |-
        Salida para POST /api/v1/plataforma/clinicas/.

        SEGURIDAD: temporary_password SOLO se devuelve en esta respuesta.
        El frontend debe mostrarlo exactamente una vez y no persistirlo.
        Esta contraseña no aparece en ningún log ni auditoría.
      properties:
        tenant:
          allOf:
          - $ref: '#/components/schemas/ClinicaOutput'
          readOnly: true
        owner_email:
          type: string
          format: email
          readOnly: true
        temporary_password:
          type: string
          readOnly: true
      required:
      - owner_email
      - temporary_password
      - tenant
    ClinicaDetailOutput:
      type: object
      description: Ficha de detalle de una clínica para el panel interno de plataforma.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        status:
          type: string
          readOnly: true
        status_display:
          type: string
          readOnly: true
        trial_ends_at:

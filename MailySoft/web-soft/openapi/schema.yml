          type: string
          readOnly: true
        tenant_slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        tenant_status:
          type: string
          readOnly: true
        trial_ends_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        plan_id:
          type: string
          format: uuid
          readOnly: true
          nullable: true
        plan_name:
          type: string
          readOnly: true
          nullable: true
        plan_slug:
          type: string
          readOnly: true
          nullable: true
        billing_cycle:
          type: string
          readOnly: true
          nullable: true
        current_period_end:
          type: string
          format: date
          readOnly: true
          nullable: true
        plan_price_monthly:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
          nullable: true
        alerta:
          type: string
          readOnly: true
          nullable: true

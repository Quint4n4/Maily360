    PatchedPlanUpdateInputRequest:
      type: object
      description: |-
        Input para PATCH /api/v1/plataforma/planes/<plan_id>/.

        Todos los campos son opcionales (PATCH parcial): solo se envían los que
        se quieren cambiar. `slug` NO aparece aquí — es inmutable, lo aplica
        `_PLAN_IMMUTABLE_FIELDS` en el servicio `plan_update`.

        EXCEPCIÓN EXPLÍCITA a la regla general de "is_active nunca en el
        InputSerializer de un PATCH genérico": Plan es el caso documentado en el
        encargo (ver docstring de `plan_update` en apps/plataforma/services.py) —
        no tiene borrado físico (PROTECT desde TenantSubscription) y el dueño
        pidió un único flujo de edición sin endpoint separado de
        activar/desactivar.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        price_monthly:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        is_featured:
          type: boolean
        features:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 200
          maxItems: 50
        is_active:
          type: boolean
        order:
          type: integer
    PatchedStaffUpdateInputRequest:
      type: object
      description: |-
        Input para PATCH /api/v1/plataforma/usuarios/<user_id>/.

        Todos los campos son opcionales (PATCH parcial). La regla de "no puedes
        cambiar tu propio platform_role/is_active" la valida el SERVICIO
        (platform_staff_update), no este serializer — el serializer no conoce
        quién es el actor.
      properties:
        first_name:
          type: string
          minLength: 1
          maxLength: 150
        last_name:
          type: string
          minLength: 1
          maxLength: 150
        platform_role:
          $ref: '#/components/schemas/PlatformRoleEnum'
        is_active:
          type: boolean
    PlanCreateInputRequest:
      type: object
      description: |-
        Input para POST /api/v1/plataforma/planes/.

        NO incluye `slug` (se genera en el servicio a partir de `name`) ni
        `is_active` como excepción distinta a la de PATCH: aquí SÍ se permite
        porque es la creación del recurso (no un update de un flag de estado
        sobre un objeto ya existente); el dueño puede querer dar de alta un plan
        ya desactivado (ej. mientras prepara su lanzamiento).
      properties:
        name:
          type: string
          minLength: 1
          description: Nombre comercial del plan.
          maxLength: 100
        price_monthly:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          description: Precio mensual en MXN. No puede ser negativo.
        description:
          type: string
          default: ''
          description: 'Descripción comercial breve (máx. 2000). Default: cadena vacía.'
          maxLength: 2000
        is_featured:
          type: boolean
          default: false
          description: Si el plan aparece destacado en la vitrina.
        features:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 200
          nullable: true
          description: Lista de strings no vacíos con las características incluidas
            (máx. 50).
          maxItems: 50
        is_active:
          type: boolean
          default: true
          description: Si el plan queda activo/asignable desde su creación.
        order:
          type: integer
          nullable: true
          description: Orden de despliegue. Si se omite, se asigna al final del catálogo.
      required:
      - name
      - price_monthly
    PlanOutput:
      type: object
      description: |-
        Serializer de salida para un Plan del catálogo.

        Contrato fijo con el frontend (docs/design/plataforma-fases-plan.md, Fase 3):
        GET /api/v1/plataforma/planes/ → lista SIN paginar, ordenada por `order`.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        name:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        price_monthly:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          readOnly: true
        is_featured:
          type: boolean
          readOnly: true
        features:
          type: array
          items:
            type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        order:
          type: integer
          readOnly: true
      required:
      - description
      - features
      - id
      - is_active
      - is_featured
      - name
      - order
      - price_monthly
      - slug
    PlatformRoleEnum:
      enum:
      - super_admin
      - sales
      - engineering
      type: string
      description: |-
        * `super_admin` - Súper Admin
        * `sales` - Ventas / Éxito de Cliente
        * `engineering` - Ingeniería

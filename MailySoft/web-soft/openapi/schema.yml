openapi: 3.0.3
info:
  title: Maily Soft API
  version: 1.0.0
  description: API REST para la plataforma de gestión clínica Maily Soft
paths:
  /api/v1/agenda/citas/:
    get:
      operationId: v1_agenda_citas_retrieve
      description: |-
        Lista paginada de citas del tenant con filtros opcionales.

        Query params:
            doctor_id:      UUID del médico.
            patient_id:     UUID del paciente.
            consultorio_id: UUID del consultorio.
            status:         Estado de la cita (scheduled|confirmed|arrived|...).
            date_from:      ISO datetime UTC inicio de rango.
            date_to:        ISO datetime UTC fin de rango.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_agenda_citas_create
      description: Crea una cita nueva en el tenant del request.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/citas/{appointment_id}/:
    get:
      operationId: v1_agenda_citas_retrieve_2
      description: Retorna el detalle de una cita.
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: v1_agenda_citas_partial_update
      description: |-
        Actualización parcial de campos editables (reason, notes, specialty).

        NO acepta status (use /estado/), ni horario (use /reagendar/).
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: v1_agenda_citas_destroy
      description: Cancela una cita. NO la borra — llama appointment_change_status(CANCELLED).
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/agenda/citas/{appointment_id}/estado/:
    post:
      operationId: v1_agenda_citas_estado_create
      description: Cambia el estado de una cita validando la transición.
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/citas/{appointment_id}/notas/:
    get:
      operationId: v1_agenda_citas_notas_retrieve
      description: Lista todas las notas del hilo de una cita, ordenadas por created_at
        ASC.
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_agenda_citas_notas_create
      description: Agrega una nota al hilo de una cita.
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/citas/{appointment_id}/reactivar/:
    post:
      operationId: v1_agenda_citas_reactivar_create
      description: |-
        POST /api/v1/agenda/citas/<appointment_id>/reactivar/

        Reactiva una cita CANCELADA al mismo horario (vuelve a 'Agendada').
        Revalida anti-empalme; si el hueco ya está ocupado, 400.
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/citas/{appointment_id}/reagendar/:
    post:
      operationId: v1_agenda_citas_reagendar_create
      description: Reagenda una cita (nuevo horario y opcionalmente nuevo consultorio).
      parameters:
      - in: path
        name: appointment_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/citas/serie/:
    post:
      operationId: v1_agenda_citas_serie_create
      description: Crea la serie y devuelve {series_id, created[], skipped[]}.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/config/:
    get:
      operationId: v1_agenda_config_retrieve
      description: Retorna la configuración de agenda del tenant del request.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: v1_agenda_config_partial_update
      description: Actualiza la configuración de agenda del tenant.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/disponibilidad/:
    get:
      operationId: v1_agenda_disponibilidad_retrieve
      description: 'Devuelve {"busy": [{"start": iso, "end": iso}, ...]}.'
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/eventos/:
    get:
      operationId: v1_agenda_eventos_retrieve
      description: Lista de eventos del tenant que solapan el rango [date_from, date_to].
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_agenda_eventos_create
      description: Crea un evento (reunión o bloqueo) en el tenant del request.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/eventos/{block_id}/:
    patch:
      operationId: v1_agenda_eventos_partial_update
      description: |-
        PATCH  /api/v1/agenda/eventos/<id>/  — edita un evento (título, fecha/hora, notas).
        DELETE /api/v1/agenda/eventos/<id>/  — elimina un evento de agenda.
      parameters:
      - in: path
        name: block_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: v1_agenda_eventos_destroy
      description: |-
        PATCH  /api/v1/agenda/eventos/<id>/  — edita un evento (título, fecha/hora, notas).
        DELETE /api/v1/agenda/eventos/<id>/  — elimina un evento de agenda.
      parameters:
      - in: path
        name: block_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/agenda/eventos/{block_id}/notas/:
    get:
      operationId: v1_agenda_eventos_notas_retrieve
      description: Lista todas las notas del hilo de un evento, ordenadas por created_at
        ASC.
      parameters:
      - in: path
        name: block_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_agenda_eventos_notas_create
      description: Agrega una nota al hilo de un evento de agenda.
      parameters:
      - in: path
        name: block_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/notas/{note_id}/:
    delete:
      operationId: v1_agenda_notas_destroy
      description: Soft-delete de una nota del hilo de agenda.
      parameters:
      - in: path
        name: note_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/agenda/tipos-cita/:
    get:
      operationId: v1_agenda_tipos_cita_retrieve
      description: Lista de tipos de cita del tenant (todos si only_active=false).
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_agenda_tipos_cita_create
      description: Crea un tipo de cita en el tenant del request.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/agenda/tipos-cita/{type_id}/:
    patch:
      operationId: v1_agenda_tipos_cita_partial_update
      description: |-
        PATCH  /api/v1/agenda/tipos-cita/<id>/  — actualización parcial.
        DELETE /api/v1/agenda/tipos-cita/<id>/  — desactivación (soft).
      parameters:
      - in: path
        name: type_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: v1_agenda_tipos_cita_destroy
      description: |-
        PATCH  /api/v1/agenda/tipos-cita/<id>/  — actualización parcial.
        DELETE /api/v1/agenda/tipos-cita/<id>/  — desactivación (soft).
      parameters:
      - in: path
        name: type_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/audit/logs/:
    get:
      operationId: v1_audit_logs_retrieve
      description: Devuelve la bitácora paginada del tenant activo.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/change-password/:
    post:
      operationId: v1_auth_change_password_create
      description: Valida la contraseña actual, aplica la nueva y rota la cookie de
        sesión.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/login/:
    post:
      operationId: v1_auth_login_create
      description: Delega a SimpleJWT; en éxito mueve el refresh a cookie y audita.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenObtainPairRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenObtainPair'
          description: ''
  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: Invalida el refresh token y elimina la cookie de sesión.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/refresh/:
    post:
      operationId: v1_auth_refresh_create
      description: Lee la cookie de refresh, rota si aplica, devuelve {access}.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/verify/:
    post:
      operationId: v1_auth_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerifyRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/v1/clinica/categorias/:
    get:
      operationId: v1_clinica_categorias_retrieve
      description: Lista paginada de categorías activas del tenant.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_clinica_categorias_create
      description: Crea una categoría de paciente en el tenant del request.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/clinica/categorias/{category_id}/:
    delete:
      operationId: v1_clinica_categorias_destroy
      description: DELETE /api/v1/clinica/categorias/<id>/  — baja lógica de una categoría.
      parameters:
      - in: path
        name: category_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/clinica/configuracion/:
    get:
      operationId: v1_clinica_configuracion_retrieve
      description: Retorna la configuración actual de la clínica o 204 si aún no existe.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    put:
      operationId: v1_clinica_configuracion_update
      description: |-
        Crea o actualiza la configuración de la clínica (upsert parcial).

        Solo actualiza los campos presentes en el payload.
        Imágenes solo se reemplazan si se envían en el request.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/clinica/credenciales/:
    get:
      operationId: v1_clinica_credenciales_retrieve
      description: |-
        GET /api/v1/clinica/credenciales/  — bandeja de validación (todo el tenant).

        Lista las credenciales de TODOS los médicos de la clínica para que el
        administrador las valide. Filtro opcional ?status=pendiente|validada|rechazada.
        Solo owner/admin (un médico ve solo las suyas en /doctores/<id>/credenciales/).
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/clinica/credenciales/{credential_id}/:
    patch:
      operationId: v1_clinica_credenciales_partial_update
      description: Edita (parcial) una credencial del médico, incluido su logo (multipart).
      parameters:
      - in: path
        name: credential_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: v1_clinica_credenciales_destroy
      description: Da de baja (is_active=False) una credencial del médico.
      parameters:
      - in: path
        name: credential_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/clinica/credenciales/{credential_id}/validar/:
    patch:
      operationId: v1_clinica_credenciales_validar_partial_update
      description: |-
        PATCH /api/v1/clinica/credenciales/<credential_id>/validar/  — valida o rechaza.

        Acción administrativa (solo owner/admin): status='validada'|'rechazada' + note.
        Solo las credenciales validadas aparecen en la receta.
      parameters:
      - in: path
        name: credential_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/clinica/doctores/{doctor_id}/credenciales/:
    get:
      operationId: v1_clinica_doctores_credenciales_retrieve
      description: Lista las credenciales activas del médico.
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_clinica_doctores_credenciales_create
      description: Agrega una credencial académica al médico.
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/clinica/doctores/{doctor_id}/perfil/:
    patch:
      operationId: v1_clinica_doctores_perfil_partial_update
      description: Actualiza sello, foto o cédulas adicionales del médico.
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/clinica/doctores/{doctor_id}/universidades/:
    get:
      operationId: v1_clinica_doctores_universidades_retrieve
      description: Lista las universidades del médico.
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_clinica_doctores_universidades_create
      description: Agrega un logo de universidad al médico.
      parameters:
      - in: path
        name: doctor_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/clinica/plantillas/:
    get:
      operationId: v1_clinica_plantillas_retrieve
      description: |-
        Lista paginada de plantillas activas del tenant.

        Query param `kind` filtra por tipo (recipe/document/consent).
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_clinica_plantillas_create
      description: Crea una plantilla clínica en el tenant del request.
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/clinica/plantillas/{template_id}/:
    get:
      operationId: v1_clinica_plantillas_retrieve_2
      description: |-
        GET    /api/v1/clinica/plantillas/<id>/  — detalle de una plantilla.
        PATCH  /api/v1/clinica/plantillas/<id>/  — actualización parcial.
        DELETE /api/v1/clinica/plantillas/<id>/  — baja lógica (is_active=False).
      parameters:
      - in: path
        name: template_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: v1_clinica_plantillas_partial_update
      description: |-
        GET    /api/v1/clinica/plantillas/<id>/  — detalle de una plantilla.
        PATCH  /api/v1/clinica/plantillas/<id>/  — actualización parcial.
        DELETE /api/v1/clinica/plantillas/<id>/  — baja lógica (is_active=False).
      parameters:
      - in: path
        name: template_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    delete:
      operationId: v1_clinica_plantillas_destroy
      description: |-
        GET    /api/v1/clinica/plantillas/<id>/  — detalle de una plantilla.
        PATCH  /api/v1/clinica/plantillas/<id>/  — actualización parcial.
        DELETE /api/v1/clinica/plantillas/<id>/  — baja lógica (is_active=False).
      parameters:
      - in: path
        name: template_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/clinica/universidades/{university_id}/:
    delete:
      operationId: v1_clinica_universidades_destroy
      description: Elimina físicamente el logo de universidad.
      parameters:
      - in: path
        name: university_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/expediente/{patient_id}/alergias/:
    get:
      operationId: v1_expediente_alergias_retrieve
      description: Lista las alergias del paciente (vigentes por defecto).
      parameters:
      - in: path
        name: patient_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
    post:
      operationId: v1_expediente_alergias_create
      description: Registra una alergia nueva para el paciente.
      parameters:
      - in: path
        name: patient_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v1
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/expediente/{patient_id}/diagnosticos/:
    get:
      operationId: v1_expediente_diagnosticos_retrieve
      description: |-
        Lista diagnósticos del paciente.


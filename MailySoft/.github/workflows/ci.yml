name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.3"

jobs:
  lint-and-format:
    name: Lint y formato
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache de dependencias
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Instalar dependencias
        working-directory: backend
        run: poetry install --with dev

      - name: Ruff (lint)
        working-directory: backend
        run: poetry run ruff check .

      - name: Black (formato)
        working-directory: backend
        run: poetry run black --check .

  typecheck:
    name: Tipado (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache de dependencias
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Instalar dependencias
        working-directory: backend
        run: poetry install --with dev

      - name: mypy
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DJANGO_SECRET_KEY: ci-secret-key-not-real
          DATABASE_URL: postgres://u:p@localhost:5432/test
        run: poetry run mypy backend/ --ignore-missing-imports

  test:
    name: Tests y cobertura
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mailysoft_test
          POSTGRES_USER: mailysoft
          POSTGRES_PASSWORD: mailysoft
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache de dependencias
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Instalar dependencias
        working-directory: backend
        run: poetry install --with dev

      - name: pytest con cobertura
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DJANGO_SECRET_KEY: ci-secret-key-not-real-at-all
          DATABASE_URL: postgres://mailysoft:mailysoft@localhost:5432/mailysoft_test
          REDIS_URL: redis://localhost:6379/1
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: "localhost"
        run: poetry run pytest --cov --cov-fail-under=80 -v

      - name: Subir reporte de cobertura
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  security:
    name: Auditoria de dependencias (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Instalar dependencias
        working-directory: backend
        run: poetry install --with dev

      - name: pip-audit
        working-directory: backend
        run: poetry run pip-audit --requirement <(poetry run pip freeze) --ignore-vuln GHSA-jfh8-c2jp-5 || true
        # El || true evita fallo en dependencias transitivas sin fix disponible;
        # revisar manualmente. Quitar cuando el pipeline sea maduro.

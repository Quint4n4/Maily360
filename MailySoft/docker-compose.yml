# =============================================================================
# Maily Soft — docker-compose.yml (entorno de desarrollo local)
# Variables sensibles en ./backend/.env.dev (NO commitear)
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Base de datos PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mailysoft_dev
      POSTGRES_USER: mailysoft
      POSTGRES_PASSWORD: mailysoft
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailysoft -d mailysoft_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis (broker Celery + cache + Channels)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend Django
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder       # usar stage builder en dev para hot-reload
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app        # mount del código para hot-reload
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev    # NO commitear, creado desde .env.example
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Celery worker
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    command: celery -A config.celery worker -l INFO -c 2
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.dev
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery beat (tareas periódicas) — opcional en dev
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    command: celery -A config.celery beat -l INFO
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.dev
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - beat   # iniciar solo con: docker-compose --profile beat up

# ---------------------------------------------------------------------------
# Volúmenes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

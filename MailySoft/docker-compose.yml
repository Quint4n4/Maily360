# =============================================================================
# Maily Soft — docker-compose.yml (entorno de desarrollo local)
# Variables sensibles en ./backend/.env.dev (NO commitear)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Base de datos PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mailysoft_dev
      POSTGRES_USER: mailysoft
      POSTGRES_PASSWORD: mailysoft
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailysoft -d mailysoft_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis (broker Celery DB0 + cache DB1 + Channels DB2)
  #
  # POLÍTICA noeviction (no allkeys-lru): la política de evicción es de TODA la
  # instancia, no por DB. Con allkeys-lru, bajo presión de memoria Redis podía
  # descartar tareas del BROKER (recordatorios con eta lejana en DB0) → recordatorios
  # PERDIDOS en silencio. Con noeviction, al llenarse Redis rechaza escrituras (falla
  # ruidosa, nunca pierde tareas); el caché (DB1) se autolimita por TTL e
  # `IGNORE_EXCEPTIONS` tolera fallos de escritura. appendonly=yes persiste las tareas
  # ante reinicios. (En producción de alta escala: broker en instancia dedicada.)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Backend Django
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder       # usar stage builder en dev para hot-reload
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app        # mount del código para hot-reload
      - /app/.venv            # ★ preservar el venv del contenedor (NO sobreescribir)
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.dev    # NO commitear, creado desde .env.example
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Celery worker
  # ---------------------------------------------------------------------------
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    command: python -m celery -A config.celery worker -l INFO -c 2
    volumes:
      - ./backend:/app
      - /app/.venv            # ★ preservar el venv del contenedor
      - media_files:/app/media  # ★ compartir los PDFs generados con el backend (en prod = S3)
    env_file:
      - ./backend/.env.dev
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Celery beat (tareas periódicas) — opcional en dev
  # ---------------------------------------------------------------------------
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    command: python -m celery -A config.celery beat -l INFO
    volumes:
      - ./backend:/app
      - /app/.venv            # ★ preservar el venv del contenedor
    env_file:
      - ./backend/.env.dev
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - beat   # iniciar solo con: docker-compose --profile beat up

# ---------------------------------------------------------------------------
# Volúmenes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

name: CI

# IMPORTANTE: este workflow vive en la RAÍZ del repo (.github/workflows/) para que
# GitHub Actions lo ejecute. El proyecto Django está en el subdirectorio MailySoft/,
# por eso los `working-directory` y rutas apuntan a MailySoft/backend.
#
# Estrategia de candados (2026-06-29):
#   - test: BLOQUEANTE. Es la red de seguridad real (~2.379 tests, cobertura ~95%).
#   - lint / format / typecheck: INFORMATIVOS (continue-on-error) — el código acumuló
#     deuda (ruff/black/mypy con muchos hallazgos) por años sin CI activo. Se reportan
#     para limpiarlos poco a poco; aún no bloquean para no frenar el trabajo.

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.8.3"

jobs:
  test:
    name: Tests y cobertura (candado bloqueante)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mailysoft_test
          POSTGRES_USER: mailysoft
          POSTGRES_PASSWORD: mailysoft
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Librerías de sistema para WeasyPrint (PDFs)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 libpangoft2-1.0-0 \
            libgdk-pixbuf-2.0-0 libcairo2 libffi-dev

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache de dependencias
        uses: actions/cache@v4
        with:
          path: MailySoft/backend/.venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('MailySoft/backend/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Instalar dependencias
        working-directory: MailySoft/backend
        run: poetry install --with dev

      - name: pytest con cobertura (>=80%)
        working-directory: MailySoft/backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DJANGO_SECRET_KEY: ci-secret-key-not-real-at-all
          DATABASE_URL: postgres://mailysoft:mailysoft@localhost:5432/mailysoft_test
          REDIS_URL: redis://localhost:6379/1
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          DJANGO_DEBUG: "True"
          DJANGO_ALLOWED_HOSTS: "localhost"
        run: poetry run pytest -q

  lint-and-format:
    name: Lint y formato (informativo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Instalar dependencias
        working-directory: MailySoft/backend
        run: poetry install --with dev

      - name: Ruff (lint)
        working-directory: MailySoft/backend
        continue-on-error: true
        run: poetry run ruff check .

      - name: Black (formato)
        working-directory: MailySoft/backend
        continue-on-error: true
        run: poetry run black --check .

  typecheck:
    name: Tipado mypy (informativo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Instalar dependencias
        working-directory: MailySoft/backend
        run: poetry install --with dev

      - name: mypy
        working-directory: MailySoft/backend
        continue-on-error: true
        env:
          DJANGO_SETTINGS_MODULE: config.settings.development
          DJANGO_SECRET_KEY: ci-secret-key-not-real
          DATABASE_URL: postgres://u:p@localhost:5432/test
        run: poetry run mypy apps/ --ignore-missing-imports

  security:
    name: Auditoría de dependencias (informativo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Instalar dependencias
        working-directory: MailySoft/backend
        run: poetry install --with dev

      - name: pip-audit
        working-directory: MailySoft/backend
        continue-on-error: true
        run: poetry run pip-audit --requirement <(poetry run pip freeze)
